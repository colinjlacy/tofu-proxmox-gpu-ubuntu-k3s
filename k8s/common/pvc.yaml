---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: model-pv
spec:
  persistentVolumeReclaimPolicy: Retain
  accessModes: ["ReadWriteOnce"]
  capacity:
    storage: 100Gi
  hostPath:
    path: /data/models
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: model-pvc
  namespace: llm
spec:
  storageClassName: ""
  volumeName: model-pv
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 100Gi